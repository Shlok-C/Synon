<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synon</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 8px;
      padding: 6px 12px;
      cursor: pointer;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }
    #definitionSection {
      display: none;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    #defWord {
      font-weight: 600;
      font-size: 15px;
      color: #111;
      margin-bottom: 6px;
    }
    #defText {
      font-size: 13px;
      color: #333;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #defText.synon-error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div id="definitionSection">
    <div id="defWord"></div>
    <div id="defText"></div>
  </div>
  <h1>Synon Settings</h1>
  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key" />
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
