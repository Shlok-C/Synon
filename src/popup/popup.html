<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synon</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 8px;
      padding: 6px 12px;
      cursor: pointer;
    }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e8e8e8;
    }
    .toggle-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #exactModeDesc {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .slider-row input[type="range"] {
      flex: 1;
    }
    #verbosityLabel {
      font-size: 12px;
      color: #888;
      min-width: 55px;
    }
  </style>
</head>
<body>
  <h1>Synon Settings</h1>
  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key" />
  <button id="save">Save</button>
  <div id="status"></div>
  <div class="toggle-row">
    <label for="exactMode">
      <input type="checkbox" id="exactMode" />
      Exact Mode
    </label>
  </div>
  <div id="exactModeDesc">When off, common words are silently skipped.</div>
  <div class="toggle-row">
    <label for="verbosity">Wikipedia Verbosity</label>
  </div>
  <div class="slider-row">
    <input type="range" id="verbosity" min="1" max="5" value="3" />
    <span id="verbosityLabel">Standard</span>
  </div>
  <div class="toggle-row">
    <label for="pdfViewer">
      <input type="checkbox" id="pdfViewer" />
      PDF Viewer
    </label>
  </div>
  <div id="pdfViewerDesc" style="font-size:12px;color:#888;margin-top:4px;">When on, PDFs open in Synon's viewer with text selection support.</div>
  <script src="popup.js"></script>
</body>
</html>
